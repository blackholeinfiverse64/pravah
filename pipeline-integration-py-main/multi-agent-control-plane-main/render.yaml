services:
  - type: web
    name: pravah-decision-brain
    env: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_FREEZE_MODE
        value: "true"
      - key: BACKEND_CORS_ORIGINS
        value: "https://multi-agent-control-plane-frontend.vercel.app,http://localhost:4500,http://localhost:3000"
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: "^https://.*\\.vercel\\.app$|^http://localhost:\\d+$"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        generateValue: true
    healthCheckPath: /health
